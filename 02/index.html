<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Love Matrix Heart - Lite</title>
  <style>
    :root {
      --bg: #030207;
      --pink: #ff4fa3;
      --pink2: #ff78bd;
      --white: #fff8da;
      --soft: rgba(255, 110, 185, .55);
    }

    * { box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: radial-gradient(circle at 50% 35%, #13061a 0%, #07040d 42%, #000 100%);
      font-family: Arial, Helvetica, sans-serif;
      color: white;
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      display: block;
      background: transparent;
    }

    .vignette {
      pointer-events: none;
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 50% 42%, transparent 0%, transparent 42%, rgba(0,0,0,.55) 78%, rgba(0,0,0,.88) 100%),
        linear-gradient(to bottom, rgba(255,255,255,.035), transparent 11%, transparent 82%, rgba(0,0,0,.38));
      mix-blend-mode: normal;
    }




    .hint {
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%);
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(0,0,0,.38);
      border: 1px solid rgba(255,255,255,.08);
      color: rgba(255,255,255,.62);
      font-size: 11px;
      opacity: 0;
      animation: hint 4.5s ease-in-out 1s 1 forwards;
      pointer-events: none;
      white-space: nowrap;
    }
    @keyframes hint {
      0%, 100% { opacity: 0; transform: translateX(-50%) translateY(8px); }
      12%, 72% { opacity: .8; transform: translateX(-50%) translateY(0); }
    }


    .letter-screen {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at 50% 28%, rgba(255, 90, 175, .20), transparent 34%),
        radial-gradient(circle at 18% 18%, rgba(255, 180, 220, .10), transparent 24%),
        linear-gradient(180deg, #070309 0%, #160716 54%, #030103 100%);
      transition: opacity .72s ease, transform .72s ease, filter .72s ease;
    }
    .letter-screen::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.026) 1px, transparent 1px);
      background-size: 38px 38px;
      mask-image: radial-gradient(circle at 50% 42%, black 0%, transparent 70%);
      opacity: .35;
    }
    .letter-screen.hide {
      opacity: 0;
      transform: scale(1.025);
      filter: blur(4px);
      pointer-events: none;
    }
    .letter-card {
      position: relative;
      width: min(88vw, 360px);
      border: 0;
      background: transparent;
      padding: 0;
      color: inherit;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      animation: letterFloat 3.4s ease-in-out infinite;
    }
    @keyframes letterFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-7px); }
    }
    .invite-card {
      position: relative;
      overflow: hidden;
      min-height: 430px;
      padding: 28px 25px 24px;
      border-radius: 30px;
      text-align: center;
      background:
        linear-gradient(180deg, rgba(255,255,255,.96), rgba(255,237,247,.93) 46%, rgba(255,213,235,.92)),
        radial-gradient(circle at 50% 0%, rgba(255,255,255,.95), transparent 44%);
      color: #68123f;
      box-shadow:
        0 26px 70px rgba(255, 65, 160, .22),
        0 0 0 1px rgba(255, 255, 255, .62) inset,
        0 0 0 1px rgba(255, 103, 177, .25);
    }
    .invite-card::before {
      content: "";
      position: absolute;
      inset: 13px;
      border-radius: 24px;
      border: 1px solid rgba(176, 51, 111, .22);
      pointer-events: none;
    }
    .invite-card::after {
      content: "";
      position: absolute;
      left: -18%;
      right: -18%;
      top: -36%;
      height: 58%;
      border-radius: 50%;
      background: radial-gradient(circle at 50% 100%, rgba(255, 105, 184, .28), transparent 62%);
      pointer-events: none;
    }
    .invite-ornament {
      position: absolute;
      width: 58px;
      height: 58px;
      opacity: .62;
      pointer-events: none;
    }
    .invite-ornament.left {
      left: 14px;
      top: 14px;
      border-left: 2px solid rgba(195, 52, 121, .28);
      border-top: 2px solid rgba(195, 52, 121, .28);
      border-radius: 18px 0 0 0;
    }
    .invite-ornament.right {
      right: 14px;
      bottom: 14px;
      border-right: 2px solid rgba(195, 52, 121, .22);
      border-bottom: 2px solid rgba(195, 52, 121, .22);
      border-radius: 0 0 18px 0;
    }
    .seal-mark {
      position: relative;
      z-index: 1;
      width: 82px;
      height: 82px;
      margin: 8px auto 18px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 35% 25%, #fff7fb 0%, #ffd1e8 38%, #ff6bb1 100%);
      color: #fff;
      font-size: 34px;
      box-shadow:
        0 14px 28px rgba(255, 70, 155, .26),
        0 0 0 8px rgba(255, 143, 197, .16),
        inset 0 0 0 1px rgba(255,255,255,.55);
    }
    .seal-mark::before,
    .seal-mark::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 40px;
      height: 28px;
      transform: translate(-50%, -50%);
      border-radius: 5px;
      border: 2px solid rgba(255,255,255,.90);
    }
    .seal-mark::after {
      width: 28px;
      height: 18px;
      transform: translate(-50%, -62%) rotate(45deg);
      border-left: 0;
      border-bottom: 0;
      border-radius: 2px;
    }
    .seal-heart {
      position: relative;
      z-index: 2;
      transform: translateY(19px);
      font-size: 15px;
      text-shadow: 0 2px 8px rgba(190, 30, 110, .28);
    }
    .invite-kicker {
      position: relative;
      z-index: 1;
      margin: 0 0 9px;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: .28em;
      text-transform: uppercase;
      color: rgba(126, 23, 72, .55);
    }
    .invite-title {
      position: relative;
      z-index: 1;
      margin: 0;
      font-size: clamp(30px, 8.2vw, 44px);
      line-height: 1.04;
      font-weight: 950;
      letter-spacing: -.03em;
      color: #73164a;
    }
    .invite-subtitle {
      position: relative;
      z-index: 1;
      width: 78%;
      margin: 16px auto 0;
      font-size: clamp(13px, 3.6vw, 15px);
      line-height: 1.65;
      color: rgba(104, 18, 63, .68);
    }
    .invite-divider {
      position: relative;
      z-index: 1;
      width: 76%;
      height: 1px;
      margin: 23px auto 18px;
      background: linear-gradient(90deg, transparent, rgba(178, 45, 112, .32), transparent);
    }
    .open-pill {
      position: relative;
      z-index: 1;
      width: fit-content;
      margin: 0 auto;
      padding: 12px 20px;
      border-radius: 999px;
      background: linear-gradient(90deg, #ff4fa3, #ff78bd);
      color: #fff;
      font-size: 13px;
      font-weight: 900;
      letter-spacing: .04em;
      box-shadow: 0 12px 28px rgba(255, 67, 157, .28);
    }
    .tap-hint {
      position: relative;
      z-index: 1;
      margin: 14px 0 0;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .08em;
      color: rgba(116, 22, 71, .43);
    }
    .mini-heart {
      position: absolute;
      color: rgba(255, 72, 160, .35);
      font-weight: 900;
      animation: tinyPulse 2.8s ease-in-out infinite;
      pointer-events: none;
    }
    .mini-heart.h1 { left: 35px; bottom: 86px; font-size: 16px; animation-delay: .2s; }
    .mini-heart.h2 { right: 44px; top: 84px; font-size: 13px; animation-delay: 1s; }
    .mini-heart.h3 { right: 28px; bottom: 104px; font-size: 18px; animation-delay: 1.5s; }
    @keyframes tinyPulse {
      0%, 100% { transform: scale(1); opacity: .35; }
      50% { transform: scale(1.18); opacity: .72; }
    }

  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="letterScreen" class="letter-screen">
    <button id="openLetter" class="letter-card" type="button" aria-label="Open love letter">
      <div class="invite-card">
        <span class="invite-ornament left"></span>
        <span class="invite-ornament right"></span>
        <span class="mini-heart h1">♥</span>
        <span class="mini-heart h2">♥</span>
        <span class="mini-heart h3">♥</span>
        <div class="seal-mark"><span class="seal-heart">♥</span></div>
        <p class="invite-kicker">Special Letter</p>
        <h1 class="invite-title">For You 🩷</h1>
        <p class="invite-subtitle">Ada pesan kecil yang disimpan khusus untuk kamu.</p>
        <div class="invite-divider"></div>
        <div class="open-pill">Buka Surat</div>
        <p class="tap-hint">tap untuk membuka</p>
      </div>
    </button>
  </div>
  <div class="vignette"></div>
  <div class="hint">Tap / klik untuk restart animasi</div>

  <!-- Taruh file music.mp3 di folder yang sama dengan index.html -->
  <audio id="bgMusic" src="./music.mp3" preload="auto" loop></audio>

  <script>
    /*
      EDIT CEPAT:
      - Ubah HEART_MESSAGE untuk tulisan di tengah hati.
      - Ubah WORDS jika mau ganti urutan kata.
      - Taruh file musik dengan nama music.mp3 di folder yang sama.
    */
    const HEART_MESSAGE = 'I Love You Sayang 🩷';
    const WORDS = [
      { text: '3',    start: 2.65,  end: 4.95, size: 0.285 },
      { text: '2',    start: 5.30,  end: 7.60, size: 0.285 },
      { text: '1',    start: 7.95,  end: 10.25, size: 0.285 },
      { text: 'You',  start: 11.20, end: 14.40, size: 0.225 },
      { text: 'Are',  start: 14.90, end: 18.10, size: 0.215 },
      { text: 'My',   start: 18.55, end: 21.55, size: 0.225 },
      { text: 'Love', start: 22.00, end: 25.40, size: 0.195 },
    ];
    const HEART_START = 26.80;
    const OUTRO_START = 38.20;
    const LOOP_SECONDS = 42.80;
    const INTRO_BLACK_END = 0.32;
    const INTRO_SCAN_END = 2.28;
    const MATRIX_POOL = [...'I LOVE YOU 🩷'];
    const LITE_MODE = true;
    const MUSIC_VOLUME = 0.75; // 0.0 sampai 1.0

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { alpha: true });
    const off = document.createElement('canvas');
    const offCtx = off.getContext('2d', { willReadFrequently: true });

    let W = 0, H = 0, DPR = 1;
    let particles = [];
    let rain = [];
    let sparkle = [];
    let lastMode = '';
    let lastText = '';
    let startTime = performance.now();
    let burstTime = 0;
    let started = false;
    let musicStarted = false;

    const rand = (a, b) => a + Math.random() * (b - a);
    const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
    const easeOut = t => 1 - Math.pow(1 - clamp(t, 0, 1), 3);
    const shuffle = arr => {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    };

    function resize() {
      DPR = Math.min(window.devicePixelRatio || 1, 1.25);
      W = window.innerWidth;
      H = window.innerHeight;
      canvas.width = Math.floor(W * DPR);
      canvas.height = Math.floor(H * DPR);
      canvas.style.width = W + 'px';
      canvas.style.height = H + 'px';
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);

      off.width = Math.floor(W);
      off.height = Math.floor(H);

      makeRain();
      makeSparkle();
      makeParticles();
      lastMode = '';
      lastText = '';
    }

    function randomMatrixChar() {
      return MATRIX_POOL[Math.floor(Math.random() * MATRIX_POOL.length)];
    }

    function makeRain() {
      // Lite mode: jumlah kolom dibuat jauh lebih sedikit agar tidak lag.
      const count = Math.floor(clamp(W / 13.5, 26, 96));
      rain = Array.from({ length: count }, () => ({
        x: rand(-W * .05, W * 1.05),
        y: rand(-H, H),
        len: Math.floor(rand(4, 9)),
        step: rand(15, 24),
        speed: rand(.70, 2.25),
        drift: rand(-.045, .045),
        alpha: rand(.13, .48),
        fontSize: rand(12, 18),
        hue: Math.random() < .90 ? 324 : 338,
        phase: rand(0, Math.PI * 2),
        chars: Array.from({ length: Math.floor(rand(4, 9)) }, () => randomMatrixChar()),
      }));
    }

    function makeSparkle() {
      const count = Math.floor(clamp(W * H / 6200, 45, 120));
      sparkle = Array.from({ length: count }, () => ({
        x: rand(0, W),
        y: rand(0, H),
        r: rand(.35, 1.4),
        a: rand(.08, .42),
        tw: rand(.8, 3.2),
        phase: rand(0, Math.PI * 2),
      }));
    }

    function makeParticles() {
      const count = Math.floor(clamp(W * H / 470, 720, 1450));
      particles = Array.from({ length: count }, () => ({
        x: rand(W * .08, W * .92),
        y: rand(H * .15, H * .78),
        vx: rand(-2, 2),
        vy: rand(-1, 2),
        tx: rand(0, W),
        ty: rand(0, H),
        size: rand(1.2, 2.7),
        alpha: rand(.55, 1),
        phase: rand(0, Math.PI * 2),
        color: 'text',
        free: true,
        rectW: rand(1.5, 2.4),
        rectH: rand(1.5, 2.8),
        highlight: Math.random() < .12,
      }));
      scatterTargets('intro');
    }

    function scatterTargets(type = 'scatter') {
      const now = performance.now();
      burstTime = now;
      particles.forEach((p, i) => {
        p.free = true;
        p.color = Math.random() < .45 ? 'pink' : 'dim';
        if (type === 'intro') {
          p.tx = rand(W * .05, W * .95);
          p.ty = rand(H * .30, H * .55) + Math.sin(i) * H * .035;
        } else if (type === 'outro') {
          p.tx = W * .5 + rand(-W * .14, W * .14);
          p.ty = H * .58 + rand(-H * .03, H * .17);
          p.color = 'pink';
        } else {
          p.tx = rand(W * .08, W * .92);
          p.ty = rand(-H * .15, H * .95);
        }
      });
    }

    function drawTrackedText(c, text, x, y, spacing = 0, center = true) {
      const chars = [...text];
      if (!chars.length) return;
      if (!spacing) {
        c.fillText(text, x, y);
        return;
      }
      const widths = chars.map(ch => c.measureText(ch).width);
      const totalWidth = widths.reduce((a, b) => a + b, 0) + spacing * Math.max(0, chars.length - 1);
      let dx = center ? x - totalWidth / 2 : x;
      for (let i = 0; i < chars.length; i++) {
        c.fillText(chars[i], dx + widths[i] / 2, y);
        dx += widths[i] + spacing;
      }
    }

    function textPoints(text, sizeScale) {
      offCtx.clearRect(0, 0, W, H);
      const fontSize = Math.round(Math.min(W, H) * sizeScale);
      const tracking = Math.max(2, Math.round(fontSize * (text.length <= 2 ? 0.022 : 0.011)));
      offCtx.save();
      offCtx.fillStyle = '#fff';
      offCtx.textAlign = 'center';
      offCtx.textBaseline = 'middle';
      offCtx.font = `900 ${fontSize}px Arial Black, Arial, Helvetica, sans-serif`;
      drawTrackedText(offCtx, text, W * .50, H * .44, tracking, true);
      offCtx.restore();

      const img = offCtx.getImageData(0, 0, W, H).data;
      const gap = Math.max(5, Math.floor(Math.min(W, H) / 110));
      const pts = [];
      for (let y = Math.floor(H * .18); y < Math.floor(H * .68); y += gap) {
        for (let x = Math.floor(W * .05); x < Math.floor(W * .95); x += gap) {
          const a = img[(y * W + x) * 4 + 3];
          if (a > 24) {
            pts.push({
              x: x + rand(-.22, .22),
              y: y + rand(-.22, .22),
              a: a / 255,
            });
          }
        }
      }
      return shuffle(pts);
    }

    function heartPoints() {
      const pts = [];
      const scale = Math.min(W, H) * .0195;
      const cx = W * .50;
      const cy = H * .425;
      const total = Math.max(900, particles.length);

      for (let i = 0; i < total; i++) {
        const t = rand(0, Math.PI * 2);
        const baseX = 16 * Math.pow(Math.sin(t), 3);
        const baseY = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
        const thickness = rand(-7.2, 7.2);
        const normalJitter = rand(-2.5, 2.5);
        pts.push({
          x: cx + baseX * scale + thickness + normalJitter,
          y: cy + baseY * scale + rand(-6.5, 6.5),
          a: rand(.62, 1),
        });
      }

      // Tambahan bagian bawah supaya hati terlihat penuh seperti percikan pink.
      for (let i = 0; i < Math.floor(total * .22); i++) {
        const t = rand(Math.PI * .82, Math.PI * 1.18);
        const baseX = 16 * Math.pow(Math.sin(t), 3);
        const baseY = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
        pts.push({
          x: cx + baseX * scale + rand(-9, 9),
          y: cy + baseY * scale + rand(-9, 9),
          a: rand(.50, 1),
        });
      }
      return shuffle(pts);
    }

    function setTextTarget(text, sizeScale) {
      const pts = textPoints(text, sizeScale);
      const textCount = Math.min(particles.length, Math.max(pts.length, Math.floor(pts.length * 1.22)));

      particles.forEach((p, i) => {
        if (i < textCount && pts.length) {
          const pt = pts[i % pts.length];
          const duplicateSpread = i >= pts.length ? rand(-.38, .38) : 0;
          p.tx = pt.x + duplicateSpread;
          p.ty = pt.y + duplicateSpread;
          p.alpha = rand(.92, 1);
          p.size = rand(1.7, 2.35);
          p.color = 'text';
          p.free = false;
          p.rectW = rand(2.0, 2.85);
          p.rectH = rand(2.15, 3.15);
          p.highlight = Math.random() < .18;
        } else {
          p.free = true;
          p.color = Math.random() < .50 ? 'dim' : 'pink';
          p.alpha = rand(.18, .42);
          p.size = rand(.68, 1.28);
          p.tx = rand(W * .08, W * .92);
          p.ty = rand(H * .14, H * .72);
        }
      });
      burstTime = performance.now();
    }

    function setHeartTarget() {
      const pts = heartPoints();
      particles.forEach((p, i) => {
        const pt = pts[i % pts.length];
        p.tx = pt.x;
        p.ty = pt.y;
        p.alpha = pt.a;
        p.size = rand(1.25, 3.0);
        p.color = 'heart';
        p.free = false;
      });
      burstTime = performance.now();
    }

    function drawRain(t, revealY = H + 80, introMode = false) {
      ctx.save();
      ctx.globalCompositeOperation = 'source-over';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.shadowBlur = 0;
      for (const r of rain) {
        r.y += r.speed;
        r.x += r.drift;
        if (r.y - r.len * r.step > H + 60) {
          r.y = rand(-H * .45, -20);
          r.x = rand(-W * .05, W * 1.05);
          r.speed = rand(.70, 2.25);
          r.step = rand(15, 24);
          r.fontSize = rand(12, 18);
          r.len = Math.floor(rand(4, 9));
          r.chars = Array.from({ length: r.len }, () => randomMatrixChar());
        }

        if (Math.random() < (introMode ? .02 : .035)) {
          const idx = Math.floor(Math.random() * r.chars.length);
          r.chars[idx] = randomMatrixChar();
        }

        ctx.font = `700 ${r.fontSize}px Arial, Helvetica, sans-serif`;
        for (let i = 0; i < r.chars.length; i++) {
          const yy = r.y - i * r.step;
          if (yy < -30 || yy > H + 30) continue;
          if (yy > revealY) continue;
          const fade = 1 - i / r.chars.length;
          const revealFade = introMode ? clamp((revealY - yy) / 26, 0, 1) : 1;
          const alpha = r.alpha * fade * revealFade;
          const light = introMode ? (72 + fade * 18) : (68 + fade * 14);
          ctx.fillStyle = `hsla(${r.hue}, 100%, ${light}%, ${alpha})`;
          ctx.fillText(r.chars[i], r.x, yy);
        }
      }
      ctx.restore();
    }

    function drawSparkle(t) {
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      for (const s of sparkle) {
        const a = s.a * (.45 + .55 * Math.sin(t * s.tw + s.phase));
        ctx.fillStyle = `rgba(255, 190, 230, ${Math.max(0, a)})`;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }

    function updateParticles(t, mode) {
      const gatherBoost = easeOut((performance.now() - burstTime) / 1000);
      for (const p of particles) {
        let k = p.free ? .010 : .024;
        let drag = p.free ? .925 : .855;
        if (mode === 'heart') { k = .020; drag = .865; }
        if (mode === 'outro') { k = .014; drag = .91; }

        const wobble = Math.sin(t * 2.5 + p.phase) * (p.free ? 1.4 : .55);
        const dx = p.tx + wobble - p.x;
        const dy = p.ty + Math.cos(t * 2.1 + p.phase) * .42 - p.y;

        p.vx += dx * k * (0.76 + gatherBoost * .42);
        p.vy += dy * k * (0.76 + gatherBoost * .42);
        p.vx *= drag;
        p.vy *= drag;
        if (p.free) p.vy += .012;
        p.x += p.vx;
        p.y += p.vy;

        if (p.free && p.y > H + 30) {
          p.x = rand(0, W);
          p.y = rand(-100, 0);
          p.vx = rand(-1, 1);
          p.vy = rand(0, 1.4);
          p.tx = rand(0, W);
          p.ty = rand(H * .18, H * .70);
        }
      }
    }

    function particleColor(p, t) {
      const tw = .78 + Math.sin(t * 7.5 + p.phase) * .22;
      if (p.color === 'heart') {
        const light = 61 + Math.sin(t * 3 + p.phase) * 9;
        return `hsla(${rand(323, 338)}, 100%, ${light}%, ${p.alpha * tw})`;
      }
      if (p.color === 'pink') return `rgba(255, 83, 168, ${p.alpha * .78 * tw})`;
      if (p.color === 'dim') return `rgba(255, 162, 212, ${p.alpha * .35 * tw})`;
      return `rgba(255, 245, 250, ${p.alpha * 1.08 * tw})`;
    }

    function drawParticles(t, mode) {
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      for (const p of particles) {
        const pulse = mode === 'heart' ? (1 + Math.sin(t * 5.5 + p.phase) * .25) : (1 + Math.sin(t * 8 + p.phase) * .10);
        const r = p.size * pulse;
        ctx.fillStyle = particleColor(p, t);

        if (mode === 'text' && !p.free && p.color === 'text') {
          ctx.globalAlpha = Math.min(1, 1.00 + Math.sin(t * 4 + p.phase) * 0.05);
          const w = p.rectW * pulse;
          const h = p.rectH * pulse;
          ctx.fillRect(p.x - w * .5, p.y - h * .5, w, h);
          if (p.highlight && Math.sin(t * 6 + p.phase) > .72) {
            ctx.fillStyle = 'rgba(255,248,252,.78)';
            ctx.fillRect(p.x - .7, p.y - h * .88, 1.4, h * .90);
          }
          ctx.globalAlpha = 1;
        } else {
          ctx.beginPath();
          ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
          ctx.fill();
        }

        if (!p.free && Math.random() < .006) {
          ctx.fillStyle = p.color === 'heart' ? 'rgba(255,190,225,.8)' : 'rgba(255,248,252,.60)';
          ctx.fillRect(p.x - 1.4, p.y - 1.4, 2.8, 2.8);
        }
      }
      ctx.restore();
    }

    function drawWordOverlay(text, sizeScale, alpha = .24) {
      // overlay helper disabled: no shadow/silhouette behind matrix text
      return;
    }

    function drawScanLine(y, progress) {
      ctx.save();
      const g = ctx.createLinearGradient(0, y - 24, 0, y + 24);
      g.addColorStop(0, 'rgba(0,0,0,0)');
      g.addColorStop(.42, 'rgba(255,110,190,.18)');
      g.addColorStop(.5, 'rgba(255,220,240,.82)');
      g.addColorStop(.58, 'rgba(255,110,190,.18)');
      g.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = g;
      ctx.fillRect(0, y - 24, W, 48);
      ctx.fillStyle = 'rgba(255, 220, 240, .75)';
      ctx.fillRect(0, y - 1, W, 2);
      ctx.globalAlpha = .14;
      ctx.fillStyle = 'rgba(255, 130, 210, .9)';
      ctx.fillRect(0, 0, W, y);
      ctx.restore();
    }

    function drawHeartText(t, fade) {
      const cx = W * .5;
      const cy = H * .425;
      ctx.save();
      ctx.globalAlpha = fade;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      const fs = Math.max(14, Math.min(W, H) * .029);
      const tracking = Math.max(1.5, fs * .03);
      ctx.font = `800 ${fs}px Arial, Helvetica, sans-serif`;
      ctx.shadowColor = 'rgba(255, 70, 150, .95)';
      ctx.shadowBlur = 18;
      ctx.fillStyle = `rgba(255, 235, 210, ${.94 + Math.sin(t * 4) * .05})`;
      drawTrackedText(ctx, HEART_MESSAGE, cx, cy + Math.min(W, H) * .005, tracking, true);
      ctx.restore();
    }

    function drawOutro(t, localT) {
      const fade = easeOut((localT - OUTRO_START) / 1.7);
      const cx = W * .50;
      const cy = H * .58;
      const s = Math.min(W, H) * (.070 + Math.sin(t * 3) * .003);

      ctx.save();
      ctx.globalAlpha = fade * .9;
      ctx.globalCompositeOperation = 'lighter';
      const g = ctx.createRadialGradient(cx, cy, s * .12, cx, cy, s * 1.35);
      g.addColorStop(0, 'rgba(255,255,255,.72)');
      g.addColorStop(.28, 'rgba(255,130,200,.55)');
      g.addColorStop(.62, 'rgba(160,110,255,.25)');
      g.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(cx, cy, s * 1.35, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = 'rgba(255,165,215,.82)';
      ctx.lineWidth = Math.max(2, s * .065);
      ctx.beginPath();
      ctx.arc(cx, cy, s * .62, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }

    function roundRect(c, x, y, w, h, r) {
      c.beginPath();
      c.moveTo(x + r, y);
      c.arcTo(x + w, y, x + w, y + h, r);
      c.arcTo(x + w, y + h, x, y + h, r);
      c.arcTo(x, y + h, x, y, r);
      c.arcTo(x, y, x + w, y, r);
      c.closePath();
    }

    function applyStage(localT) {
      let mode = 'scatter';
      let label = '';
      let current = WORDS.find(w => localT >= w.start && localT < w.end);

      if (current) {
        mode = 'text';
        label = current.text;
        if (lastMode !== mode || lastText !== label) {
          setTextTarget(current.text, current.size);
          lastMode = mode;
          lastText = label;
        }
      } else if (localT >= HEART_START && localT < OUTRO_START + 4.7) {
        mode = localT >= OUTRO_START ? 'outro' : 'heart';
        label = 'heart';
        if (lastMode !== 'heart' && lastMode !== 'outro') {
          setHeartTarget();
          lastText = label;
        }
        if (lastMode !== mode) {
          lastMode = mode;
        }
      } else if (localT < 2.45) {
        mode = 'intro';
        label = 'intro';
        if (lastMode !== mode) {
          scatterTargets('intro');
          lastMode = mode;
          lastText = label;
        }
      } else {
        mode = 'scatter';
        label = 'scatter';
        if (lastMode !== mode || lastText !== label) {
          scatterTargets('scatter');
          lastMode = mode;
          lastText = label;
        }
      }
      return mode;
    }

    function drawScreenGlow(t) {
      ctx.save();
      const g = ctx.createRadialGradient(W * .5, H * .42, 0, W * .5, H * .42, Math.max(W, H) * .62);
      g.addColorStop(0, 'rgba(255,70,160,.07)');
      g.addColorStop(.43, 'rgba(80,95,255,.035)');
      g.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, W, H);

      // sedikit garis diagonal seperti rekaman layar laptop.
      ctx.globalAlpha = .10;
      ctx.strokeStyle = 'rgba(255,255,255,.12)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(W * .04, H * .12);
      ctx.lineTo(W * .96, H * .02);
      ctx.stroke();
      ctx.restore();
    }


    function startMusic() {
      if (musicStarted) return;
      const music = document.getElementById('bgMusic');
      if (!music) return;

      musicStarted = true;
      music.volume = MUSIC_VOLUME;
      music.currentTime = 0;

      // Browser hanya mengizinkan audio play setelah user klik/tap.
      const playPromise = music.play();
      if (playPromise && typeof playPromise.catch === 'function') {
        playPromise.catch(() => {
          musicStarted = false;
        });
      }
    }

    function startExperience(ev) {
      if (ev) {
        ev.preventDefault();
        ev.stopPropagation();
      }
      if (started) return;
      started = true;
      startTime = performance.now();
      lastMode = '';
      lastText = '';
      scatterTargets('intro');
      startMusic();
      const letter = document.getElementById('letterScreen');
      if (letter) {
        letter.classList.add('hide');
        setTimeout(() => letter.remove(), 850);
      }
    }

    function animate(now) {
      const elapsed = (now - startTime) / 1000;
      const localT = elapsed % LOOP_SECONDS;
      if (elapsed > LOOP_SECONDS && localT < .05) {
        lastMode = '';
        lastText = '';
      }

      ctx.clearRect(0, 0, W, H);
      if (!started) {
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, W, H);
        requestAnimationFrame(animate);
        return;
      }

      const mode = applyStage(localT);
      const currentWord = WORDS.find(w => localT >= w.start && localT < w.end);

      if (localT < INTRO_BLACK_END) {
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, W, H);
        requestAnimationFrame(animate);
        return;
      }

      if (localT < INTRO_SCAN_END) {
        const p = clamp((localT - INTRO_BLACK_END) / (INTRO_SCAN_END - INTRO_BLACK_END), 0, 1);
        const scanY = -30 + (H + 60) * p;
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, W, H);
        drawRain(elapsed, scanY, true);
        drawScanLine(scanY, p);
        requestAnimationFrame(animate);
        return;
      }

      ctx.fillStyle = 'rgba(0,0,0,.34)';
      ctx.fillRect(0, 0, W, H);
      drawScreenGlow(elapsed);
      drawRain(elapsed);
      drawSparkle(elapsed);
      updateParticles(elapsed, mode);
      drawParticles(elapsed, mode);

      if (mode === 'heart' || mode === 'outro') {
        const fade = easeOut((localT - HEART_START) / 1.5) * (mode === 'outro' ? Math.max(.25, 1 - (localT - OUTRO_START) / 5.5) : 1);
        drawHeartText(elapsed, fade);
      }
      if (mode === 'outro') drawOutro(elapsed, localT);

      requestAnimationFrame(animate);
    }

    const letterScreen = document.getElementById('letterScreen');
    const openLetter = document.getElementById('openLetter');
    if (letterScreen) letterScreen.addEventListener('pointerdown', startExperience, { passive: false });
    if (openLetter) openLetter.addEventListener('click', startExperience, { passive: false });

    window.addEventListener('resize', resize, { passive: true });
    window.addEventListener('pointerdown', () => {
      if (!started) return;
      startTime = performance.now();
      lastMode = '';
      lastText = '';
      scatterTargets('intro');
    }, { passive: true });

    resize();
    requestAnimationFrame(animate);
  </script>
</body>
</html>
