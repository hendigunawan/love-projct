<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <title>Animated Love Heart Particle</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      overflow: hidden;
      touch-action: none;
      background: radial-gradient(circle at center, #1a0010 0%, #080008 100%);
      font-family: Arial, sans-serif;
    }

    canvas {
      display: block;
      touch-action: none;
      cursor: grab;
    }

    canvas:active {
      cursor: grabbing;
    }

    .title {
      position: fixed;
      top: 35px;
      width: 100%;
      text-align: center;
      color: white;
      font-size: 36px;
      font-weight: bold;
      font-style: italic;
      z-index: 10;
      pointer-events: none;
      text-shadow: 0 0 12px rgba(255, 120, 180, 0.8);
    }

    .hint {
      position: fixed;
      top: 85px;
      width: 100%;
      text-align: center;
      color: rgba(255, 255, 255, 0.75);
      font-size: 14px;
      z-index: 10;
      pointer-events: none;
    }

    .music-btn {
      position: fixed;
      right: 18px;
      top: 18px;
      z-index: 20;
      border: none;
      border-radius: 999px;
      padding: 10px 14px;
      background: rgba(255, 111, 174, 0.9);
      color: white;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 0 18px rgba(255, 120, 180, 0.55);
    }

    .music-btn:active {
      transform: scale(0.96);
    }

    .code-box {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      width: 82%;
      max-width: 760px;
      background: rgba(30, 30, 47, 0.90);
      color: #b8c7ff;
      border-radius: 14px;
      padding: 18px;
      font-family: Consolas, monospace;
      font-size: 14px;
      box-shadow: 0 0 25px rgba(255, 120, 180, 0.35);
      z-index: 10;
      white-space: pre-wrap;
      pointer-events: none;

      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    .bar {
      color: white;
      margin-bottom: 10px;

      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: flex-start;
      gap: 6px;
      width: 100%;
    }

    .dot {
      display: block;
      width: 12px;
      height: 12px;
      min-width: 12px;
      min-height: 12px;
      border-radius: 50%;
      flex: 0 0 auto;
    }

    .red {
      background: #ff5f57;
    }

    .yellow {
      background: #ffbd2e;
    }

    .green {
      background: #28c840;
    }

    .message {
      line-height: 1.5;
    }

    @media (max-width: 600px) {
      .title {
        font-size: 28px;
        top: 28px;
      }

      .hint {
        top: 70px;
        font-size: 12px;
      }

      .music-btn {
        right: 12px;
        top: 12px;
        padding: 8px 12px;
        font-size: 12px;
      }

      .code-box {
        width: 90%;
        bottom: 25px;
        font-size: 12px;
        padding: 14px;
      }

      .dot {
        width: 11px;
        height: 11px;
        min-width: 11px;
        min-height: 11px;
      }
    }
  </style>
</head>

<body>
  <div class="title">Love Heart For Her</div>
  <div class="hint">Click / touch lalu geser untuk memutar hati</div>

  <button id="musicBtn" class="music-btn">🔇 Music</button>

  <audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg" />
  </audio>

  <div class="code-box">
    <div class="bar">
      <span class="dot red"></span>
      <span class="dot yellow"></span>
      <span class="dot green"></span>
    </div>

    <div class="message">
      Luvv you sayangku cintaku istriku tercinta 😘🩷.
      Semangat menjalani hari-hari nyaa 🥰....
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

  <script>
    // =============================
    // Scene, Camera, Renderer
    // =============================
    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(
      75,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );

    camera.position.z = 38;

    const renderer = new THREE.WebGLRenderer({
      antialias: true,
      alpha: true
    });

    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const canvas = renderer.domElement;
    canvas.style.touchAction = "none";

    // =============================
    // Music
    // =============================
    const bgMusic = document.getElementById("bgMusic");
    const musicBtn = document.getElementById("musicBtn");

    let musicStarted = false;
    let musicPlaying = false;

    bgMusic.volume = 0.45;

    async function playMusic() {
      try {
        await bgMusic.play();
        musicStarted = true;
        musicPlaying = true;
        musicBtn.textContent = "🔊 Music";
      } catch (err) {
        console.log("Music play blocked:", err);
      }
    }

    function pauseMusic() {
      bgMusic.pause();
      musicPlaying = false;
      musicBtn.textContent = "🔇 Music";
    }

    musicBtn.addEventListener("click", function (e) {
      e.stopPropagation();

      if (musicPlaying) {
        pauseMusic();
      } else {
        playMusic();
      }
    });

    // =============================
    // Heart Group
    // =============================
    const heartGroup = new THREE.Group();
    scene.add(heartGroup);

    // =============================
    // Heart Formula
    // =============================
    function heartPoint(t) {
      const x = 16 * Math.pow(Math.sin(t), 3);

      const y =
        13 * Math.cos(t) -
        5 * Math.cos(2 * t) -
        2 * Math.cos(3 * t) -
        Math.cos(4 * t);

      return { x, y };
    }

    // =============================
    // Heart Particles
    // =============================
    const count = 1400;

    const positions = new Float32Array(count * 3);
    const colors = new Float32Array(count * 3);
    const basePositions = [];

    for (let i = 0; i < count; i++) {
      const t = Math.random() * Math.PI * 2;
      const p = heartPoint(t);

      const scale = 0.65 + Math.random() * 0.45;

      const spreadX = (Math.random() - 0.5) * 1.8;
      const spreadY = (Math.random() - 0.5) * 1.8;
      const spreadZ = (Math.random() - 0.5) * 6.0;

      const x = p.x * scale + spreadX;
      const y = p.y * scale + spreadY;
      const z = spreadZ;

      positions[i * 3] = x;
      positions[i * 3 + 1] = y;
      positions[i * 3 + 2] = z;

      basePositions.push({
        x: x,
        y: y,
        z: z,
        offset: Math.random() * Math.PI * 2
      });

      const color = new THREE.Color();
      color.setHSL(
        0.92 + Math.random() * 0.06,
        1.0,
        0.60 + Math.random() * 0.18
      );

      colors[i * 3] = color.r;
      colors[i * 3 + 1] = color.g;
      colors[i * 3 + 2] = color.b;
    }

    const geometry = new THREE.BufferGeometry();
    geometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute("color", new THREE.BufferAttribute(colors, 3));

    const material = new THREE.PointsMaterial({
      size: 0.18,
      vertexColors: true,
      transparent: true,
      opacity: 0.92,
      depthWrite: false
    });

    const particles = new THREE.Points(geometry, material);
    heartGroup.add(particles);

    // =============================
    // Center Circle / Core
    // =============================
    const centerGeometry = new THREE.SphereGeometry(3.2, 64, 64);

    const centerMaterial = new THREE.MeshBasicMaterial({
      color: 0xff6fae,
      transparent: true,
      opacity: 0.92
    });

    const centerHeart = new THREE.Mesh(centerGeometry, centerMaterial);
    heartGroup.add(centerHeart);

    // =============================
    // Initial A
    // A tetap lurus, tidak ikut muter
    // =============================
    function createInitialSprite(text) {
      const textCanvas = document.createElement("canvas");
      textCanvas.width = 512;
      textCanvas.height = 512;

      const ctx = textCanvas.getContext("2d");
      ctx.clearRect(0, 0, textCanvas.width, textCanvas.height);

      ctx.shadowColor = "rgba(255, 255, 255, 1)";
      ctx.shadowBlur = 32;

      ctx.fillStyle = "#ffffff";
      ctx.font = "bold 330px Arial";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(text, textCanvas.width / 2, textCanvas.height / 2 + 14);

      const texture = new THREE.CanvasTexture(textCanvas);
      texture.needsUpdate = true;

      const spriteMaterial = new THREE.SpriteMaterial({
        map: texture,
        transparent: true,
        depthTest: false,
        depthWrite: false
      });

      const sprite = new THREE.Sprite(spriteMaterial);

      sprite.scale.set(6.0, 6.0, 1);
      sprite.renderOrder = 999;

      return sprite;
    }

    const initialSprite = createInitialSprite("A");

    scene.add(initialSprite);

    const centerWorldPos = new THREE.Vector3();

    // =============================
    // Background Stars
    // =============================
    const starCount = 300;
    const starPositions = new Float32Array(starCount * 3);

    for (let i = 0; i < starCount; i++) {
      starPositions[i * 3] = (Math.random() - 0.5) * 100;
      starPositions[i * 3 + 1] = (Math.random() - 0.5) * 100;
      starPositions[i * 3 + 2] = -20 - Math.random() * 80;
    }

    const starGeometry = new THREE.BufferGeometry();
    starGeometry.setAttribute(
      "position",
      new THREE.BufferAttribute(starPositions, 3)
    );

    const starMaterial = new THREE.PointsMaterial({
      size: 0.08,
      color: 0xffffff,
      transparent: true,
      opacity: 0.45,
      depthWrite: false
    });

    const stars = new THREE.Points(starGeometry, starMaterial);
    scene.add(stars);

    // =============================
    // Clock
    // =============================
    const clock = new THREE.Clock();

    // =============================
    // Manual Rotation Control
    // PC: click + drag
    // HP: touch + drag
    // =============================
    let isPointerDown = false;
    let lastPointerX = 0;
    let lastPointerY = 0;

    let targetRotateX = 0;
    let targetRotateY = 0;

    let currentRotateX = 0;
    let currentRotateY = 0;

    canvas.addEventListener("pointerdown", function (e) {
      isPointerDown = true;

      lastPointerX = e.clientX;
      lastPointerY = e.clientY;

      canvas.setPointerCapture(e.pointerId);

      // Musik mulai setelah user klik/touch pertama kali
      if (!musicStarted) {
        playMusic();
      }
    });

    canvas.addEventListener("pointermove", function (e) {
      if (!isPointerDown) {
        return;
      }

      const deltaX = e.clientX - lastPointerX;
      const deltaY = e.clientY - lastPointerY;

      targetRotateY += deltaX * 0.01;
      targetRotateX += deltaY * 0.01;

      const limit = Math.PI / 3;

      if (targetRotateX > limit) {
        targetRotateX = limit;
      }

      if (targetRotateX < -limit) {
        targetRotateX = -limit;
      }

      lastPointerX = e.clientX;
      lastPointerY = e.clientY;
    });

    function stopDrag() {
      isPointerDown = false;
    }

    canvas.addEventListener("pointerup", stopDrag);
    canvas.addEventListener("pointercancel", stopDrag);
    canvas.addEventListener("pointerleave", stopDrag);

    // =============================
    // Animation Loop
    // =============================
    function animate() {
      requestAnimationFrame(animate);

      const time = clock.getElapsedTime();

      heartGroup.position.y = Math.sin(time * 1.6) * 1.2;
      heartGroup.position.x = Math.cos(time * 0.9) * 0.8;

      if (!isPointerDown) {
        targetRotateY += 0.002;
      }

      currentRotateX += (targetRotateX - currentRotateX) * 0.15;
      currentRotateY += (targetRotateY - currentRotateY) * 0.15;

      heartGroup.rotation.x = currentRotateX;
      heartGroup.rotation.y = currentRotateY;
      heartGroup.rotation.z = Math.sin(time * 0.8) * 0.03;

      const pulse = 1 + Math.sin(time * 3.0) * 0.06;
      heartGroup.scale.set(pulse, pulse, pulse);

      const pos = geometry.attributes.position.array;

      for (let i = 0; i < count; i++) {
        const b = basePositions[i];

        pos[i * 3] =
          b.x + Math.sin(time * 2.0 + b.offset) * 0.15;

        pos[i * 3 + 1] =
          b.y + Math.cos(time * 2.2 + b.offset) * 0.15;

        pos[i * 3 + 2] =
          b.z + Math.sin(time * 1.8 + b.offset) * 0.2;
      }

      geometry.attributes.position.needsUpdate = true;

      centerHeart.rotation.x += 0.006;
      centerHeart.rotation.y += 0.008;

      // A tetap lurus di tengah lingkaran
      centerHeart.getWorldPosition(centerWorldPos);

      initialSprite.position.copy(centerWorldPos);
      initialSprite.position.z += 3.8;

      const aScale = 6.0 * pulse;
      initialSprite.scale.set(aScale, aScale, 1);

      stars.rotation.y += 0.0008;
      stars.rotation.x += 0.0003;

      renderer.render(scene, camera);
    }

    animate();

    // =============================
    // Resize
    // =============================
    window.addEventListener("resize", function () {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();

      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    });
  </script>
</body>
</html>
